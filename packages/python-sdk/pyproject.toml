[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urisocial"
version = "2.0.0"
description = "Official Python SDK for URI Social API - Enterprise-grade social media content generation and management"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["urisocial", "social-media", "ai", "content-generation", "instagram", "facebook", "twitter", "linkedin", "tiktok", "analytics", "video", "blog", "automation", "multi-tenant", "brand-management"]
authors = [
  {name = "URI Social", email = "support@urisocial.com"}
]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "requests>=2.31.0",
  "typing-extensions>=4.5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
  "pytest-cov>=4.1.0",
  "black>=23.7.0",
  "mypy>=1.5.0",
  "flake8>=6.1.0",
]

[project.urls]
Homepage = "https://urisocial.com"
Documentation = "https://docs.urisocial.com"
Repository = "https://github.com/uri-social/urisocial-sdk"

[tool.black]
line-length = 100
target-version = ["py38"]

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
